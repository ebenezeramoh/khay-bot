# Render.com deployment configuration
# Upload this file as render.yaml in your repository root

services:
  - type: web
    name: xauusd-ai-api
    env: python
    plan: free          # upgrade to starter for always-on
    buildCommand: pip install -r requirements.txt && python train_model.py
    startCommand: uvicorn predict_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: MODEL_PATH
        value: ai_model.pkl
      - key: SCALER_PATH
        value: scaler.pkl
    healthCheckPath: /health
